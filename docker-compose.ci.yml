services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: umfrage
      POSTGRES_USER: umfrage
      POSTGRES_PASSWORD: ci-test-pw
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umfrage"]
      interval: 3s
      timeout: 3s
      retries: 10

  app:
    image: tiangolo/uvicorn-gunicorn-fastapi:python3.11
    environment:
      MODULE_NAME: main
      VARIABLE_NAME: app
      PORT: 8000
      DATABASE_URL: postgresql://umfrage:ci-test-pw@db:5432/umfrage
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-test-placeholder}
    volumes:
      - ./app:/app
    ports:
      - "8061:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/stats').read()"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s
